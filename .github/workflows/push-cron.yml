name: Enviar Push Notifications Diárias

on:
  # Roda todo dia às 10:00 UTC = 07:00 horário de Brasília (GMT-3)
  schedule:
    - cron: '0 10 * * *'

  # Permite executar manualmente pelo painel do GitHub (para testes)
  workflow_dispatch:

jobs:
  enviar-push:
    name: Disparar Edge Function de Push
    runs-on: ubuntu-latest

    steps:
      - name: Chamar Supabase Edge Function
        run: |
          echo "🔔 Disparando notificações push diárias..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/enviar-push-diario" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json")

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Status HTTP: $HTTP_STATUS"
          echo "Resposta: $BODY"

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "❌ Falha ao chamar Edge Function (status $HTTP_STATUS)"
            exit 1
          fi

          echo "✅ Push notifications enviadas com sucesso!"
